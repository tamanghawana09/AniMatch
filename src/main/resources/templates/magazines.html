<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AniMatch - Magazines </title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <div class="logo"><a class="logo-design" th:href="@{/}">AniMatch</a></div>
    <ul class="nav-links">
        <li><a th:href="@{/browse}">Browse</a></li>
        <li><a th:href="@{/airing}">Airing</a></li>
        <li><a th:href="@{/upcoming}">Upcoming</a></li>
        <li><a th:href="@{/magazines}">Magazines</a></li>

    </ul>
    <div class="nav-right">
        <button class="btn-search">⌕</button>
        <button class="btn-primary">Start Watching</button>
    </div>
</nav>
<section class="browse-hero">
    <div class="hero-bg"></div>
    <div class="browse-hero-content">
        <div class="hero-badge">
            <div class="badge-dot"></div>
            EXPLORE THE COLLECTION
        </div>
        <h1 class="browse-title">Magazine<span> Rally</span></h1>
        <div class="browse-anime-grid">
            <div class="browse-anime-card" th:each="anime : ${magazine}" target="_blank">
                <div class="browse-anime-thumb">
                    <a th:href="${anime.url}">
                        <svg class="thumb-art" viewBox="0 0 140 210" >
                            <rect width="140" height="210" fill="#0a1a3e"/>
                            <circle cx="70" cy="80" r="40" fill="none" stroke="rgba(76,142,247,0.3)" stroke-width="2"/>
                            <circle cx="70" cy="80" r="25" fill="none" stroke="rgba(76,142,247,0.2)" stroke-width="1"/>
                            <circle cx="70" cy="75" r="18" fill="rgba(76,142,247,0.4)"/>
                            <rect x="50" y="100" width="40" height="70" rx="6" fill="rgba(50,100,200,0.4)"/>
                            <rect x="35" y="105" width="15" height="55" rx="7" fill="rgba(50,100,200,0.3)"/>
                            <rect x="90" y="105" width="15" height="55" rx="7" fill="rgba(50,100,200,0.3)"/>
                            <rect x="42" y="172" width="18" height="38" rx="9" fill="rgba(40,80,180,0.4)"/>
                            <rect x="80" y="172" width="18" height="38" rx="9" fill="rgba(40,80,180,0.4)"/>
                        </svg>
                        <div class="browse-anime-rating-badge" th:classappend="${anime.count == null} ? 'no-score'">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <span th:text="${anime.count} ?: 'N/A'"></span>
                        </div>
                    </a>
                </div>
                <div class="browse-anime-info">
                    <div class="browse-anime-name" th:text="${anime.name}"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
