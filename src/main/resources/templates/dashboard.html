<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AniMatch - Get All Anime Information </title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div class="logo"><a class="logo-design" th:href="@{/}">AniMatch</a></div>
        <ul class="nav-links">
            <li><a th:href="@{/browse}">Browse</a></li>
            <li><a th:href="@{/airing}">Airing</a></li>
            <li><a th:href="@{/upcoming}">Upcoming</a></li>
            <li><a th:href="@{/magazines}">Magazines</a></li>

        </ul>
        <div class="nav-right">
            <button class="btn-search">⌕</button>
            <button class="btn-primary">Start Watching</button>
        </div>
    </nav>
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <div class="badge-dot"></div>
                <span th:text="${heroAnime.season}"></span>
                <span>Season</span>
            </div>
            <h1 class="hero-title" th:text="${heroAnime.title}">
            </h1>
            <p class="hero-desc" th:text="${#strings.substring(heroAnime.synopsis, 0, 200) + '...'}">
            </p>
            <div class="hero-actions">
                <a class="btn-outline logo-design" th:href="${heroAnime.url}" target="_blank">Browse Catalog</a>
            </div>
            <div class="hero-stats">
                <div class="stat">
                    <div class="stat-num" th:text="${heroAnime.episodes}"><span>+</span></div>
                    <div class="stat-label">Episodes</div>
                </div>
                <div class="stat">
                    <div class="stat-num" th:text="${heroAnime.status}"></div>
                    <div class="stat-label">Status</div>
                </div>
                <div class="stat">
                    <div class="stat-num" th:text="${heroAnime.duration}"></div>
                    <div class="stat-label">Duration</div>
                </div>
            </div>
        </div>

        <div class="hero-visual">
            <!-- Floating badge top-left -->
            <div class="float-card float-card-1">
                <div class="float-title">Trending Now</div>
                <div class="float-val">#1 This Week</div>
                <div class="float-badge red">🔴 New Episode</div>
            </div>

            <!-- Main featured card -->
            <div class="featured-card">
                <div class="card-art">
                    <div class="card-art-circles"></div>
                    <div class="card-art-lines"></div>
                    <img th:src="${heroAnime.largeImageUrl}" alt="anime-image" style="width:100%;"/>

                </div>
                <div class="card-overlay">
                    <div class="card-genre">
                        <span th:each="genre : ${heroAnime.genres}" th:text="${genre.name} + ' '"></span>
                    </div>
                    <div class="card-title" th:text="${heroAnime.title}"></div>
                    <div class="card-meta">
                        <div class="card-rating" th:text="${heroAnime.rating}"></div>
                        <span th:text="${heroAnime.episodes}"></span>
                        <span>Episodes</span>

                    </div>
                </div>
            </div>
            <div class="float-card float-card-2">
                <div class="float-title">Ranking</div>
                <div class="float-val" th:text="'#' + ${heroAnime.rank}"></div>
                <div class="float-badge" th:text="${heroAnime.score} + ' Score'"></div>
            </div>


        </div>
    </section>
    <div class="divider"></div>

    <section class="section">
        <div class="section-header">
            <div class="section-title">Recommended Anime</div>
            <a class="see-all" th:href="@{/recommendations}">See All →</a>
        </div>
        <div class="anime-grid">
            <div th:each="recommend: ${recommendAnime}">
                <a class="anime-card-link" th:href="@{'/anime/'+${recommend.entry[0].malId}}">
                <div class="anime-card">
                    <div class="anime-thumb">
                        <img th:src="${recommend.entry[0].images.jpg.largeImageUrl}" alt="anime-image" class="thumb-art"/>
                        <div class="anime-ep-badge">NEW EP</div>
                    </div>
                    <div class="anime-name" th:text="${recommend.entry[0].title}"></div>
                </div>
                </a>
            </div>
        </div>
    </section>
    <div class="divider"></div>
    <section class="genres-section">
        <div class="section-header" style="margin-bottom:1.2rem">
            <div class="section-title">Browse by Genre</div>
        </div>
        <div class="genres-grid">
            <div class="genre-pill"
                 th:each="genre : ${genres}"
                 th:text="${genre.name}"
                 th:classappend="'gp-' + ${#strings.toLowerCase(#strings.replace(#strings.replace(#strings.replace(genre.name, ' ', '-'), '(', ''), ')', ''))}">
            </div>
            <div class="divider"></div>
        </div>
    </section>

    <div class="divider"></div>
    <footer class="footer-strip">
        <div class="footer-logo">AniMatch</div>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Support</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Careers</a>
        </div>
        <div style="font-size:0.75rem;color:rgba(232,230,240,0.2);">© 2026 AniMatch Inc.<span> By Hawana 🔥</span></div>
    </footer>
</body>
</html>
